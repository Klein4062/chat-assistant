<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <button class="sidebar-toggle" id="sidebarToggle" title="会话列表">☰</button>
                <div class="avatar-icon">🤖</div>
                <div class="header-info">
                    <h1>AI 助手</h1>
                    <div class="connection-status" id="connectionStatus">
                        <span class="status-dot"></span>
                        <span class="status-text">连接中...</span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <span class="username-tag" id="usernameDisplay"></span>
                <button class="logout-button" id="logoutButton" title="退出登录">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Body: Sidebar + Chat -->
        <div class="main-body">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="new-conv-btn" id="newConvButton" title="新建会话">
                        <span>+</span> 新建会话
                    </button>
                </div>
                <div class="conv-list" id="convList">
                    <!-- Conversation items rendered by JS -->
                </div>
                <div class="sidebar-footer">
                    <span class="conv-count" id="convCount">0/3</span>
                </div>
            </aside>

            <!-- Chat Area -->
            <div class="chat-area">
                <!-- Messages Area -->
                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-message" id="welcomeMessage">
                        <div class="welcome-icon">👋</div>
                        <h2>欢迎使用 AI 助手</h2>
                        <p>选择一个会话或新建一个开始对话吧！</p>
                    </div>
                </div>

                <!-- Image Preview -->
                <div class="image-preview" id="imagePreview" style="display:none">
                    <img id="previewImg" src="" alt="预览">
                    <button class="image-preview-remove" id="removeImage" title="移除图片">✕</button>
                </div>

                <!-- Input Area -->
                <div class="input-container">
                    <div class="input-wrapper">
                        <input type="file" id="imageInput" accept="image/*" style="display:none">
                        <button class="upload-button" id="uploadButton" title="上传图片">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </button>
                        <textarea
                            id="messageInput"
                            placeholder="输入消息，支持粘贴图片..."
                            rows="1"
                            autofocus
                            disabled
                        ></textarea>
                        <button id="sendButton" title="发送" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="icp-footer">
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">京ICP备2026032890号</a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
